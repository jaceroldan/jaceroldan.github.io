<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>💚 Babi Countdown Timer 🩷</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                text-align: center;
                margin: 50px;
            }
            .timer {
                font-size: 48px;
                margin: 20px;
            }
            .timer span {
                font-size: 48px;
                margin: 0 5px;
            }
        </style>
    </head>
    <body>
        <h1>💚 Babi Countdown Timer 🩷</h1>
        <div class="timer" id="timer">
            <span id="days">00</span> days <span id="hours">00</span> hours
            <span id="minutes">00</span> minutes
            <span id="seconds">00</span> seconds
        </div>

        <script>
            function updateTimer() {
                const targetDate = new Date(
                    "March 29, 2025 23:59:00"
                ).getTime();
                const now = new Date().getTime();
                let timeLeft = targetDate - now;

                if (timeLeft <= 0) {
                    document.getElementById("days").textContent = "00";
                    document.getElementById("hours").textContent = "00";
                    document.getElementById("minutes").textContent = "00";
                    document.getElementById("seconds").textContent = "00";
                    return;
                }

                const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
                const hours = Math.floor((timeLeft / (1000 * 60 * 60)) % 24);
                const minutes = Math.floor((timeLeft / (1000 * 60)) % 60);
                const seconds = Math.floor((timeLeft / 1000) % 60);

                document.getElementById("days").textContent = String(
                    days
                ).padStart(2, "0");
                document.getElementById("hours").textContent = String(
                    hours
                ).padStart(2, "0");
                document.getElementById("minutes").textContent = String(
                    minutes
                ).padStart(2, "0");
                document.getElementById("seconds").textContent = String(
                    seconds
                ).padStart(2, "0");
            }

            setInterval(updateTimer, 1000);
            updateTimer(); // Initialize immediately
        </script>
    </body>
</html>
